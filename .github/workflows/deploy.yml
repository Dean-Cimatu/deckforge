name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Trigger Render deploys
    runs-on: ubuntu-latest
    steps:
      - name: Deploy API
        if: ${{ env.HOOK != '' }}
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_API }}
        run: curl -fsS "$HOOK"

      - name: Deploy Web
        if: ${{ env.HOOK != '' }}
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_WEB }}
        run: curl -fsS "$HOOK"
