name: Keep-alive

on:
  schedule:
    # Every 5 minutes — prevents Render free-tier spin-down
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    name: Ping API health
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://deckforge-api.onrender.com/health)
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::API returned $STATUS — may still be deploying"
          fi
